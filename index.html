<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo 3D estilo Crossy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="hud">
      <h1>Crossy 3D</h1>
      <p><strong>Controlos:</strong> WASD ou Setas</p>
      <p><strong>Objetivo:</strong> Avança o máximo sem ser atropelado.</p>
      <p>Pontuação: <span id="score">0</span></p>
      <p id="status">Pronto para jogar</p>
      <button id="restart" hidden>Recomeçar</button>
    </div>
    <canvas id="game"></canvas>

    <script type="module" src="game.js"></script>
  </body>
</html>
